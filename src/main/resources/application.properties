spring.application.name=geospatialcommandcenter

# ?? H2 In-Memory Event Store ??
spring.datasource.url=jdbc:h2:mem:gccdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# ?? GraphQL ???????????????????????????????????????????????????????????????????
# Built-in GraphiQL disabled ? replaced with a self-hosted, CDN-free explorer
# served at /graphiql.html (AppConfig redirects /graphiql ? /graphiql.html)
spring.graphql.graphiql.enabled=false
spring.graphql.path=/graphql

# ?? JPA ???????????????????????????????????????????????????????????????????????
# Suppress the open-in-view WARN that pollutes startup logs
spring.jpa.open-in-view=false

# ?? Pipeline Orchestrator ??
gcc.pipeline.interval-seconds=60
gcc.pipeline.alert-confidence-threshold=0.6
gcc.pipeline.alert-severity-threshold=MODERATE

# ?? Agent 1: Pulse Ingestor ??
gcc.agent1.gdelt.base-url=https://api.gdeltproject.org/api/v2/doc/doc
gcc.agent1.gdelt.query=Iran conflict strike protest
gcc.agent1.gdelt.max-records=250
gcc.agent1.acled.base-url=https://api.acleddata.com/acled/read
gcc.agent1.acled.key=${ACLED_API_KEY:demo}
gcc.agent1.acled.email=${ACLED_EMAIL:demo@example.com}
gcc.agent1.firms.base-url=https://firms.modaps.eosdis.nasa.gov/api/area/csv
gcc.agent1.firms.map-key=${NASA_FIRMS_KEY:DEMO_KEY}
gcc.agent1.firms.source=VIIRS_SNPP_NRT
gcc.agent1.firms.area-coords=25,44,40,64
gcc.agent1.usgs.base-url=https://earthquake.usgs.gov/fdsnws/event/1/query
gcc.agent1.usgs.min-latitude=25
gcc.agent1.usgs.max-latitude=40
gcc.agent1.usgs.min-longitude=44
gcc.agent1.usgs.max-longitude=64
gcc.agent1.usgs.min-magnitude=2.5

# ?? Agent 2: Geo-Temporal Resolver ??
gcc.agent2.geocoder.provider=nominatim
gcc.agent2.geocoder.nominatim-url=https://nominatim.openstreetmap.org/search
gcc.agent2.geocoder.geonames-username=${GEONAMES_USER:demo}
gcc.agent2.geocoder.rate-limit-ms=1100
gcc.agent2.ner.model=en-ner-location.bin

# ?? Agent 3: Evidence Validator ??
gcc.agent3.min-corroboration-sources=2
gcc.agent3.deception-high-threshold=0.7
gcc.agent3.confidence-floor=0.1
gcc.agent3.recycled-media-window-days=180

# ?? Agent 4: Fusion & Forecast ??
gcc.agent4.cluster.eps-km=25.0
gcc.agent4.cluster.min-points=2
gcc.agent4.cluster.time-window-minutes=120
gcc.agent4.severity.casualty-weight=0.35
gcc.agent4.severity.infra-weight=0.25
gcc.agent4.severity.spread-weight=0.20
gcc.agent4.severity.escalation-weight=0.20

# ?? Agent 5: Command Brief ??
gcc.agent5.sitrep.interval-minutes=60
gcc.agent5.sitrep.flash-interval-minutes=15
gcc.agent5.alert.flash-confidence=0.85
gcc.agent5.alert.flash-severity=CRITICAL

# ?? Agent 8: Naval Fleet Monitor ??????????????????????????????????????????
# AISHub (free tier ? register at https://www.aishub.net/join-us)
gcc.naval.aishub.username=${AISHUB_USERNAME:}
# MarineTraffic Extended API (paid ? https://www.marinetraffic.com/en/p/api-service)
gcc.naval.marinetraffic.api-key=${MARINETRAFFIC_API_KEY:}

# ?? Task Scheduler ??????????????????????????????????????????????????????????
# Expand the default 1-thread pool so Agents 7 and 8 run concurrently with the
# PipelineOrchestrator instead of being starved by its 4-5 min geocoding phase.
spring.task.scheduling.pool.size=4

# ?? Logging ??
logging.level.com.aiinpm.geospatialcommandcenter=DEBUG
